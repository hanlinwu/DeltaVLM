model:
  arch: instruct_vicuna7b
  model_type: vicuna7b
  load_pretrained: True
  # intialize stage 2 pretraining from stage 1 pretrained model
  pretrained: "https://storage.googleapis.com/sfr-vision-language-research/LAVIS/models/InstructBLIP/instruct_blip_vicuna7b_trimmed.pth"
  # "https://storage.googleapis.com/sfr-vision-language-research/LAVIS/models/InstructBLIP/instruct_blip_vicuna7b_trimmed.pth"
  # pretrained_image_qformer: https://storage.googleapis.com/sfr-vision-language-research/LAVIS/models/BLIP2/blip2_pretrained.pth
  freeze_vit: True
  # pretrained: "/root/autodl-tmp/Blip2CC/output/20240717013/checkpoint_23.pth"
  # prompt: "describe the image."

datasets:
  changechat_105k:
    vis_processor:
        train:
          name: "blip2_image_train"
          image_size: 224
        eval:
          name: "blip_image_eval"
          image_size: 224
    text_processor:
        train:
          name: "blip_caption"
        eval:
          name: "blip_caption"

run:
  task: image_text_pretrain
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8

  weight_decay: 0.05
  max_epoch: 50
  batch_size_train: 12
  batch_size_eval: 4
  num_workers: 8
  warmup_steps: 1000

  seed: 42
  output_dir: "output/BLIP2/train_vicua"

  amp: True
  resume_ckpt_path: null

  evaluate: False 
  train_splits: ["train"]
  valid_splits: ["val"]
  val_freq: 1
  stop_criteria: 10
  save_freq: 1


  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True